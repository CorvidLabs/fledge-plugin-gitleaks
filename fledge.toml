# fledge.toml — project task definitions
[tasks]
build = "cargo build --release"
test = "cargo test"
lint = "cargo clippy -- -D warnings"
fmt = "cargo fmt --check"
smoke = "cargo run --release -- --help"

[lanes.verify]
description = "Format, lint, test, build, and smoke-test the Gitleaks plugin"
steps = ["fmt", "lint", "test", "smoke"]
