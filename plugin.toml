[plugin]
name = "fledge-plugin-secrets"
version = "0.1.0"
description = "Scan your repo for committed secrets via gitleaks. Built in Rust."
author = "0xLeif"
license = "MIT"

[[commands]]
name = "secrets"
description = "Scan your repo for committed secrets, install a pre-commit hook"
binary = "target/release/fledge-secrets"

[capabilities]
exec = false
store = false
metadata = false
