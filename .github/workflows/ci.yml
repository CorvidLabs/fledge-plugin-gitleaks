name: CI

on:
  push:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - benches/**
      - Cargo.toml
      - Cargo.lock
      - fledge.toml
      - plugin.toml
      - .github/workflows/ci.yml
  pull_request:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - benches/**
      - Cargo.toml
      - Cargo.lock
      - fledge.toml
      - plugin.toml
      - .github/workflows/ci.yml

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - run: cargo test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings
      - run: cargo fmt --check

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Run ShellCheck on all .sh files
        run: |
          if compgen -G "**/*.sh" > /dev/null 2>&1 || find . -name '*.sh' | grep -q .; then
            find . -name '*.sh' -not -path './.git/*' -print0 | xargs -0 shellcheck
          else
            echo "No .sh files found — skipping."
          fi

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: Verify binary starts
        run: ./target/release/fledge-gitleaks --help
      - name: Verify subcommands are accessible
        run: |
          ./target/release/fledge-gitleaks scan --help
          ./target/release/fledge-gitleaks check --help
          ./target/release/fledge-gitleaks install-hook --help
          ./target/release/fledge-gitleaks uninstall-hook --help
